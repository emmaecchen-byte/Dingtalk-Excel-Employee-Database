version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dingtalk-attendance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dingtalk_attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dingtalk_attendance"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional one-shot demo seed (run: docker compose --profile seed up seed)
  seed:
    profiles: ["seed"]
    image: python:3.12-slim
    container_name: dingtalk-attendance-seed
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dingtalk_attendance
      DEMO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -e
        pip install -q -r requirements.txt
        python scripts/seed_demo_data.py

volumes:
  postgres_data:
