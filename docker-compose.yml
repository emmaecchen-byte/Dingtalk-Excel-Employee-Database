version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dingtalk-attendance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dingtalk_attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dingtalk_attendance"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot demo seed against Postgres (profile: seed)
  seed:
    profiles: ["seed", "demo"]
    image: python:3.12-slim
    container_name: dingtalk-attendance-seed
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dingtalk_attendance
      DEMO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -e
        pip install -q -r requirements.txt
        python scripts/seed_demo_data.py

volumes:
  postgres_data:

# Usage:
#   npm run seed                          # SQLite/local Python seed
#   npm run docker:up                     # Postgres only
#   npm run docker:seed                   # Postgres + one-shot seed
#   npm run docker:up:seed                # Postgres (detached) + seed
#   docker compose --profile demo up -d   # Postgres + auto seed on first start
